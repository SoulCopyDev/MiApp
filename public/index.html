<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA meta -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AI Explorer" />
    <meta name="application-name" content="AI Explorer" />

    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" href="/icons/icon-512.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/favicon.png" />

    <!-- Expo/react-native-web style reset -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      body {
        overflow: hidden;
        margin: 0;
        padding: 0;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>Necesitas habilitar JavaScript para ejecutar AI Explorer.</noscript>
    <div id="root"></div>

    <!-- Service Worker registration — runs after load to avoid blocking first paint -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker
            .register('/service-worker.js')
            .catch(function (err) {
              console.warn('[AI Explorer] SW registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
